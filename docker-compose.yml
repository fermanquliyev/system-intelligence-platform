services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sip
    ports:
      - "5433:5432"   # host 5433 to avoid conflict with local Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: src/SystemIntelligencePlatform.DbMigrator/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=sip;Username=postgres;Password=postgres"
      OpenIddict__Applications__SystemIntelligencePlatform_App__ClientId: "SystemIntelligencePlatform_App"
      OpenIddict__Applications__SystemIntelligencePlatform_App__RootUrl: "http://localhost:4200"
      OpenIddict__Applications__SystemIntelligencePlatform_Swagger__ClientId: "SystemIntelligencePlatform_Swagger"
      OpenIddict__Applications__SystemIntelligencePlatform_Swagger__RootUrl: "http://localhost:44397/"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: src/SystemIntelligencePlatform.HttpApi.Host/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      # Kestrel must listen on 8080 so host port 44397 maps correctly
      ASPNETCORE_URLS: "http://*:8080"
      # Use Postgres container (service name "postgres"); env overrides appsettings so local host Postgres is never used
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=sip;Username=postgres;Password=postgres"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      # API is exposed as HTTP on host port 44397; Angular (localhost:4200) calls this URL
      App__SelfUrl: "http://localhost:44397"
      App__AngularUrl: "http://localhost:4200"
      # Allow both localhost and 127.0.0.1 so CORS works whether user opens http://localhost:4200 or http://127.0.0.1:4200
      App__CorsOrigins: "http://localhost:4200,http://127.0.0.1:4200"
      # HealthChecks UI polls this URL; [::]:8080 is invalid for HttpClient, use loopback
      App__HealthUiCheckUrl: "http://127.0.0.1:8080/health-status"
      # API is HTTP in Docker; discovery and tokens must use same base URL
      AuthServer__Authority: "http://localhost:44397"
      AuthServer__RequireHttpsMetadata: "false"
      AI__Provider: ${AI__Provider:-Google}
      AI__Model: ${AI__Model:-gemma-3-4b-it}
      AI__ApiKey: ${AI__ApiKey:-}
      DataRetention__LogRetentionDays: ${DataRetention__LogRetentionDays:-90}
    ports:
      - "44397:8080"

  worker:
    build:
      context: .
      dockerfile: src/SystemIntelligencePlatform.BackgroundWorker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      # Use Postgres container (service name "postgres"); env overrides appsettings so local host Postgres is never used
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=sip;Username=postgres;Password=postgres"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      AI__Provider: ${AI__Provider:-Google}
      AI__Model: ${AI__Model:-gemma-3-4b-it}
      AI__ApiKey: ${AI__ApiKey:-}

  angular:
    build:
      context: .
      dockerfile: angular/Dockerfile
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres_data: {}
